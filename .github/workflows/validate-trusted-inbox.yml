name: Validate trusted inbox fix

on:
  push:
    branches:
      - agent/trusted-inbox-fallback-v13
  workflow_dispatch:

jobs:
  flutter-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  functions-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci

      - name: Load function exports
        env:
          FUNCTIONS_CONTROL_API: 'true'
        run: node -e "const exported = require('./bootstrap.js'); console.log(Object.keys(exported).sort().join('\n'));"

      - name: Run functions tests
        run: npm test
