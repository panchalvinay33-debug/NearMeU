name: Publish NearMeU legal site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish privacy and deletion pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build legal site
        shell: bash
        env:
          NEARMEU_SUPPORT_EMAIL: ${{ vars.NEARMEU_SUPPORT_EMAIL }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import html
          import os
          import pathlib
          import re
          import shutil

          email = os.environ.get("NEARMEU_SUPPORT_EMAIL", "").strip()
          if not re.fullmatch(r"[A-Za-z0-9.!#$%&'*+/=?^_`{|}~-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}", email):
              raise SystemExit(
                  "Set the repository variable NEARMEU_SUPPORT_EMAIL to a valid monitored support address."
              )

          source = pathlib.Path("legal-site")
          output = pathlib.Path("_site")
          if output.exists():
              shutil.rmtree(output)
          shutil.copytree(source, output)

          replacement = html.escape(email, quote=True)
          for page in output.glob("*.html"):
              content = page.read_text(encoding="utf-8")
              content = content.replace("{{SUPPORT_EMAIL}}", replacement)
              if "{{" in content or "}}" in content:
                  raise SystemExit(f"Unresolved template marker in {page}")
              page.write_text(content, encoding="utf-8")
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
