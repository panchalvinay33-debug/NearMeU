name: Build signed production AAB

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-aab
  cancel-in-progress: false

jobs:
  build-aab:
    name: Signed Android App Bundle
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate release version
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+\+[1-9][0-9]*$ ]]; then
            echo "::error::pubspec.yaml version must look like 1.2.3+45."
            exit 1
          fi

          safe_version=${version/+/-}
          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$safe_version" >> "$GITHUB_OUTPUT"

      - name: Configure private upload signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          for required in \
            ANDROID_UPLOAD_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_PASSWORD \
            ANDROID_KEY_ALIAS; do
            if [[ -z "${!required:-}" ]]; then
              echo "::error::Missing production-release secret: $required"
              exit 1
            fi
          done

          mkdir -p android/keystore
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" \
            | base64 --decode \
            > android/keystore/upload-keystore.jks
          chmod 600 android/keystore/upload-keystore.jks

          keytool -list \
            -keystore android/keystore/upload-keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            > /dev/null

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../keystore/upload-keystore.jks
          EOF
          chmod 600 android/key.properties

      - name: Build obfuscated release App Bundle
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: Verify signed bundle and generate manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.release_version }}
        run: |
          set -euo pipefail
          bundle=build/app/outputs/bundle/release/app-release.aab
          test -s "$bundle"
          jarsigner -verify -certs "$bundle"
          sha256sum "$bundle" > build/app-release.aab.sha256

          cat > build/release-metadata.txt <<EOF
          version=$RELEASE_VERSION
          git_sha=$GITHUB_SHA
          git_ref=$GITHUB_REF
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: nearmeu-${{ steps.metadata.outputs.artifact_version }}-${{ github.sha }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app-release.aab.sha256
            build/release-metadata.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload Dart obfuscation symbols
        uses: actions/upload-artifact@v4
        with:
          name: nearmeu-symbols-${{ steps.metadata.outputs.artifact_version }}-${{ github.sha }}
          path: build/symbols
          if-no-files-found: error
          retention-days: 90

      - name: Remove signing material
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties
          rm -rf android/keystore
