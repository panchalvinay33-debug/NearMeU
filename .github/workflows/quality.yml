name: NearMeU Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Format workspace
        run: dart format --output=none .
      - name: Analyze
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos 2>&1 | tee analyze.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Test
        id: tests
        if: always()
        shell: bash
        run: |
          set +e
          flutter test 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Build debug APK
        id: build
        if: always()
        shell: bash
        run: |
          set +e
          flutter build apk --debug 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Flutter diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-diagnostics
          path: |
            analyze.log
            test.log
            build.log
          retention-days: 7
      - name: Enforce Flutter checks
        if: always()
        shell: bash
        run: |
          echo "Analyze status: ${{ steps.analyze.outputs.status }}"
          echo "Test status: ${{ steps.tests.outputs.status }}"
          echo "Build status: ${{ steps.build.outputs.status }}"
          test "${{ steps.analyze.outputs.status }}" = "0"
          test "${{ steps.tests.outputs.status }}" = "0"
          test "${{ steps.build.outputs.status }}" = "0"

  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install rule-test dependencies
        run: npm install --legacy-peer-deps
      - name: Install Firebase CLI
        run: npm install --global firebase-tools
      - name: Run emulator rule tests
        id: rules-test
        shell: bash
        run: |
          set +e
          firebase emulators:exec --only firestore "npm run test:rules" > rules-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Firestore diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-rules-diagnostics
          path: rules-test.log
          retention-days: 7
      - name: Enforce Firestore rules tests
        if: always()
        shell: bash
        run: |
          tail -n 80 rules-test.log || true
          test "${{ steps.rules-test.outputs.status }}" = "0"

  cloud-functions:
    name: Cloud Functions checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate function syntax
        run: node --check index.js
