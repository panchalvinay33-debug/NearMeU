name: NearMeU quality gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify changed Dart files are formatted
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t dart_files < <(
              git diff --name-only --diff-filter=ACM \
                "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
                -- '*.dart'
            )
          else
            mapfile -t dart_files < <(
              git diff-tree --no-commit-id --name-only -r HEAD -- '*.dart'
            )
          fi

          if (( ${#dart_files[@]} == 0 )); then
            echo "No changed Dart files to format-check."
            exit 0
          fi

          printf 'Checking formatting for:\n%s\n' "${dart_files[*]}"
          dart format --output=none --set-exit-if-changed "${dart_files[@]}"

      - name: Analyze
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rule-test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Run Firestore emulator tests
        run: firebase emulators:exec --only firestore "npm run test:rules"
