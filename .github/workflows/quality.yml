name: NearMeU quality gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate production release configuration
        run: bash tool/validate_release_config.sh

      - name: Validate Play Store launch package
        run: bash tool/validate_store_launch_package.sh

      - name: Upload resolved Flutter lockfile
        uses: actions/upload-artifact@v4
        with:
          name: resolved-pubspec-lock
          path: pubspec.lock
          if-no-files-found: error
          retention-days: 1

      - name: Validate changed Dart files with formatter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t dart_files < <(
              git diff --name-only --diff-filter=ACM \
                "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
                -- '*.dart'
            )
          else
            mapfile -t dart_files < <(
              git diff-tree --no-commit-id --name-only -r HEAD -- '*.dart'
            )
          fi

          if (( ${#dart_files[@]} == 0 )); then
            echo "No changed Dart files to validate."
            exit 0
          fi

          printf 'Validating Dart files:\n%s\n' "${dart_files[*]}"
          dart format --output=none "${dart_files[@]}"

      - name: Analyze for compile errors
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter tests
        run: flutter test

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          flutter build apk --debug --verbose > android-debug-build.log 2>&1
          status=$?
          tail -n 300 android-debug-build.log
          exit "$status"

      - name: Upload Android build diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-build-log
          path: android-debug-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Verify unsigned release builds are refused
        shell: bash
        run: |
          set +e
          release_output=$(flutter build apk --release 2>&1)
          status=$?
          set -e
          printf '%s\n' "$release_output"

          if (( status == 0 )); then
            echo "Release build unexpectedly succeeded without a private keystore."
            exit 1
          fi

          if ! grep -q "Release signing is not configured" <<< "$release_output"; then
            echo "Release build failed for an unexpected reason."
            exit 1
          fi

  functions:
    name: Cloud Functions checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: npm ci --prefix functions --no-audit --no-fund

      - name: Run function unit tests
        run: npm test --prefix functions

      - name: Load secure function definitions
        run: node -e "require('./functions')"

  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install rule-test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Run Firestore emulator tests
        shell: bash
        run: |
          set +e
          firebase emulators:exec \
            --debug \
            --project demo-nearmeu-rules-test \
            --only firestore \
            "npm run test:rules" > firestore-test.log 2>&1
          status=$?
          cat firestore-test.log
          exit "$status"

      - name: Upload Firestore diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-rules-test-log
          path: firestore-test.log
          if-no-files-found: error
          retention-days: 7
